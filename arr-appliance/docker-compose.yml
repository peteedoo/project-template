# *arr appliance — all media/downloads on NAS. Local disk = OS + images only.
# Requires: /mnt/nas mounted before start (see scripts/check-nas.sh)

services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Denver}
    volumes:
      - ${NAS_APPDATA}/prowlarr:/config
    ports:
      - "9696:9696"
    restart: unless-stopped
    networks:
      - arr

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Denver}
    volumes:
      - ${NAS_APPDATA}/sonarr:/config
      - ${NAS_MEDIA}/tv:/tv
      - ${NAS_DOWNLOADS}:/downloads
    ports:
      - "8989:8989"
    restart: unless-stopped
    networks:
      - arr

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Denver}
    volumes:
      - ${NAS_APPDATA}/radarr:/config
      - ${NAS_MEDIA}/movies:/movies
      - ${NAS_DOWNLOADS}:/downloads
    ports:
      - "7878:7878"
    restart: unless-stopped
    networks:
      - arr

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Denver}
    volumes:
      - ${NAS_APPDATA}/bazarr:/config
      - ${NAS_MEDIA}/tv:/tv
      - ${NAS_MEDIA}/movies:/movies
    ports:
      - "6767:6767"
    restart: unless-stopped
    networks:
      - arr

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Denver}
      - WEBUI_PORT=8080
    volumes:
      - ${NAS_APPDATA}/qbittorrent:/config
      - ${NAS_DOWNLOADS}:/downloads
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    restart: unless-stopped
    networks:
      - arr

networks:
  arr:
    driver: bridge
