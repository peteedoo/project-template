# Ubuntu netplan — Mac Mini firewall (Google Fiber)
# Copy to: /etc/netplan/01-minifw.yaml
# Apply:   sudo netplan apply
#
# BEFORE EDITING: run `ip -br link` and replace interface names below.

network:
  version: 2
  renderer: networkd

  ethernets:
  # WAN — USB Ethernet adapter → Google Fiber Jack
  # DHCP only; Google assigns your public IPv4 address.
    wan-usb:
      match:
        name: enx*          # USB adapters usually show as enx<mac>
      set-name: wan0
      dhcp4: true
      dhcp6: true
      optional: true
      # Uncomment ONLY if plain DHCP fails after 10+ minutes (older GF installs):
      # dhcp4-overrides:
      #   use-routes: true
      # vlans:
      #   wan-vlan2:
      #     id: 2
      #     link: wan0
      #     dhcp4: true

  # LAN — built-in Ethernet → gigabit switch → Deco XE75
    lan-built-in:
      match:
        name: enp*          # built-in port; may be eno1 on some installs
      set-name: lan0
      addresses:
        - 192.168.10.1/24
      dhcp4: false
      dhcp6: false
