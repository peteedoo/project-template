# FALLBACK ONLY — use if wan0 never gets a DHCP address from Google Fiber.
# Some older GF installs require VLAN 2 + CoS 3.
# Copy to: /etc/netplan/01-minifw.yaml (replaces the standard file)
# Apply:   sudo netplan apply

network:
  version: 2
  renderer: networkd

  ethernets:
    wan-raw:
      match:
        name: enx*
      set-name: wan0
      dhcp4: false
      optional: true

    lan-built-in:
      match:
        name: enp*
      set-name: lan0
      addresses:
        - 192.168.10.1/24
      dhcp4: false

  vlans:
    wan-vlan2:
      id: 2
      link: wan0
      dhcp4: true
      dhcp6: true
